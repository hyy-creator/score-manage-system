# 服务端口
server:
  port: 8080

# MySQL数据库连接
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/school_score?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: root
    # hikari缩进和url、username同级，在datasource内部
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.school.scorebackend.entity
  configuration:
    map-underscore-to-camel-case: true

# 打印SQL日志
logging:
  level:
    com.school.scorebackend.mapper: debug